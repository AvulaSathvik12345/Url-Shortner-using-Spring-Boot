<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Snip — URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --ink: #0f0e0c;
          --paper: #f5f2ec;
          --cream: #ede9e0;
          --accent: #c84b2f;
          --accent-hover: #a33820;
          --muted: #7a7468;
          --border: #d4cfc5;
          --success-bg: #eef6ee;
          --success-ink: #2a6e2a;
          --error-bg: #fdf0ee;
          --error-ink: #b83820;
          --mono: 'DM Mono', monospace;
          --serif: 'Instrument Serif', Georgia, serif;
          --sans: 'Sora', sans-serif;
        }

        html, body {
          height: 100%;
          background: var(--paper);
          color: var(--ink);
          font-family: var(--sans);
          font-size: 15px;
          line-height: 1.6;
        }

        /* Subtle grid texture */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background-image:
            linear-gradient(var(--border) 1px, transparent 1px),
            linear-gradient(90deg, var(--border) 1px, transparent 1px);
          background-size: 40px 40px;
          opacity: 0.25;
          pointer-events: none;
          z-index: 0;
        }

        .page {
          position: relative;
          z-index: 1;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 0 1.5rem 4rem;
        }

        /* Header */
        header {
          width: 100%;
          max-width: 640px;
          padding: 3rem 0 2.5rem;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          animation: fadeUp 0.5s ease both;
        }

        .logo {
          font-family: var(--serif);
          font-size: 2.6rem;
          font-style: italic;
          letter-spacing: -0.02em;
          color: var(--ink);
          line-height: 1;
          margin-bottom: 0.35rem;
        }

        .logo span {
          color: var(--accent);
        }

        .tagline {
          font-size: 0.82rem;
          color: var(--muted);
          font-weight: 300;
          letter-spacing: 0.08em;
          text-transform: uppercase;
        }

        /* Main card */
        .card {
          width: 100%;
          max-width: 640px;
          background: #fff;
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 2rem;
          box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
          animation: fadeUp 0.5s 0.1s ease both;
        }

        .field-label {
          font-size: 0.72rem;
          font-weight: 500;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: 0.5rem;
          display: block;
        }

        .input-row {
          display: flex;
          gap: 0.6rem;
          align-items: stretch;
        }

        input[type="url"], input[type="text"] {
          flex: 1;
          padding: 0.75rem 1rem;
          border: 1.5px solid var(--border);
          border-radius: 8px;
          background: var(--paper);
          font-family: var(--mono);
          font-size: 0.85rem;
          color: var(--ink);
          outline: none;
          transition: border-color 0.15s, background 0.15s;
        }

        input[type="url"]:focus, input[type="text"]:focus {
          border-color: var(--accent);
          background: #fff;
        }

        input::placeholder { color: var(--border); }

        .btn {
          padding: 0.75rem 1.4rem;
          background: var(--accent);
          color: #fff;
          border: none;
          border-radius: 8px;
          font-family: var(--sans);
          font-size: 0.82rem;
          font-weight: 500;
          cursor: pointer;
          transition: background 0.15s, transform 0.1s;
          white-space: nowrap;
          letter-spacing: 0.02em;
        }

        .btn:hover { background: var(--accent-hover); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .divider {
          margin: 1.5rem 0;
          border: none;
          border-top: 1px solid var(--cream);
        }

        /* Custom alias row */
        .alias-row {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          margin-top: 1rem;
        }

        .alias-prefix {
          font-family: var(--mono);
          font-size: 0.82rem;
          color: var(--muted);
          white-space: nowrap;
          flex-shrink: 0;
        }

        /* Result panel */
        .result {
          margin-top: 1.2rem;
          padding: 1rem 1.1rem;
          border-radius: 8px;
          display: none;
          align-items: center;
          gap: 0.75rem;
          animation: fadeUp 0.3s ease both;
        }

        .result.success {
          display: flex;
          background: var(--success-bg);
          border: 1px solid #b6d9b6;
        }

        .result.error {
          display: flex;
          background: var(--error-bg);
          border: 1px solid #e8b4ac;
          color: var(--error-ink);
          font-size: 0.85rem;
        }

        .result-url {
          flex: 1;
          font-family: var(--mono);
          font-size: 0.88rem;
          color: var(--success-ink);
          word-break: break-all;
        }

        .copy-btn {
          padding: 0.4rem 0.9rem;
          border: 1.5px solid #2a6e2a;
          background: transparent;
          color: var(--success-ink);
          border-radius: 6px;
          font-family: var(--sans);
          font-size: 0.75rem;
          font-weight: 500;
          cursor: pointer;
          transition: background 0.15s;
          white-space: nowrap;
          flex-shrink: 0;
        }

        .copy-btn:hover { background: #d4edd4; }
        .copy-btn.copied { background: var(--success-ink); color: #fff; border-color: var(--success-ink); }

        /* History section */
        .history-section {
          width: 100%;
          max-width: 640px;
          margin-top: 2rem;
          animation: fadeUp 0.5s 0.2s ease both;
        }

        .history-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 0.75rem;
        }

        .history-title {
          font-size: 0.72rem;
          font-weight: 500;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: var(--muted);
        }

        .clear-btn {
          font-size: 0.72rem;
          color: var(--muted);
          background: none;
          border: none;
          cursor: pointer;
          text-decoration: underline;
          padding: 0;
        }

        .clear-btn:hover { color: var(--accent); }

        .history-list {
          display: flex;
          flex-direction: column;
          gap: 0.5rem;
        }

        .history-item {
          background: #fff;
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 0.75rem 1rem;
          display: flex;
          align-items: center;
          gap: 0.75rem;
          animation: fadeUp 0.25s ease both;
        }

        .history-original {
          flex: 1;
          font-size: 0.8rem;
          color: var(--muted);
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .history-short {
          font-family: var(--mono);
          font-size: 0.82rem;
          color: var(--accent);
          white-space: nowrap;
          flex-shrink: 0;
        }

        .history-copy {
          background: none;
          border: none;
          cursor: pointer;
          color: var(--muted);
          font-size: 0.75rem;
          padding: 0.2rem 0.5rem;
          border-radius: 4px;
          transition: color 0.15s, background 0.15s;
          flex-shrink: 0;
        }

        .history-copy:hover { background: var(--cream); color: var(--ink); }

        /* Rate limit banner */
        .rate-banner {
          display: none;
          width: 100%;
          max-width: 640px;
          margin-top: 1rem;
          padding: 0.75rem 1rem;
          background: var(--error-bg);
          border: 1px solid #e8b4ac;
          border-radius: 8px;
          font-size: 0.82rem;
          color: var(--error-ink);
          animation: fadeUp 0.3s ease both;
        }

        .rate-banner.visible { display: block; }

        /* Spinner */
        .spinner {
          display: inline-block;
          width: 14px; height: 14px;
          border: 2px solid rgba(255,255,255,0.4);
          border-top-color: #fff;
          border-radius: 50%;
          animation: spin 0.6s linear infinite;
          flex-shrink: 0;
        }

        /* Empty state */
        .empty-state {
          text-align: center;
          padding: 1.5rem 0;
          color: var(--muted);
          font-size: 0.82rem;
        }

        /* Footer */
        footer {
          margin-top: auto;
          padding-top: 3rem;
          font-size: 0.75rem;
          color: var(--border);
          font-family: var(--mono);
          animation: fadeUp 0.5s 0.3s ease both;
        }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(10px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
          .input-row { flex-direction: column; }
          .btn { width: 100%; }
          .history-original { max-width: 140px; }
        }
    </style>
</head>
<body>
<div class="page">

    <header>
        <div class="logo">Sn<span>i</span>p.</div>
        <p class="tagline">Shorten any link, instantly</p>
    </header>

    <div class="card">
        <label class="field-label" for="url-input">Paste your long URL</label>
        <div class="input-row">
            <input type="url" id="url-input" placeholder="https://example.com/very/long/path?query=something" autocomplete="off" spellcheck="false"/>
            <button class="btn" id="shorten-btn" onclick="shortenUrl()">Shorten</button>
        </div>

        <!-- Custom alias (optional) -->
        <div class="alias-row">
            <span class="alias-prefix" id="origin-prefix">http://localhost:8080/</span>
            <input type="text" id="alias-input" placeholder="custom-alias (optional)" maxlength="30" style="flex:1"/>
        </div>

        <div class="result" id="result-box">
            <span class="result-url" id="result-url"></span>
            <button class="copy-btn" id="copy-btn" onclick="copyResult()">Copy</button>
        </div>
    </div>

    <div class="rate-banner" id="rate-banner">
        ⚠ Rate limit hit — you're sending too many requests. Wait a moment and try again.
    </div>

    <div class="history-section" id="history-section" style="display:none">
        <div class="history-header">
            <span class="history-title">Recent links</span>
            <button class="clear-btn" onclick="clearHistory()">Clear all</button>
        </div>
        <div class="history-list" id="history-list"></div>
    </div>

    <footer>snip · built with spring boot · open source</footer>
</div>

<script>
    const API_BASE = '';  // same origin; change to 'http://localhost:8080' for local dev

    // Show current origin as alias prefix
    document.getElementById('origin-prefix').textContent = window.location.origin + '/';

    // Load history from localStorage
    let history = JSON.parse(localStorage.getItem('snip_history') || '[]');
    renderHistory();

    async function shortenUrl() {
      const urlInput = document.getElementById('url-input');
      const aliasInput = document.getElementById('alias-input');
      const btn = document.getElementById('shorten-btn');
      const resultBox = document.getElementById('result-box');
      const rateBanner = document.getElementById('rate-banner');

      const url = urlInput.value.trim();
      if (!url) { urlInput.focus(); return; }

      // Basic URL validation
      try { new URL(url); } catch {
        showResult('error', 'Please enter a valid URL including https://');
        return;
      }

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      resultBox.className = 'result';
      rateBanner.className = 'rate-banner';

      const body = { url };
      const alias = aliasInput.value.trim();
      if (alias) body.alias = alias;

      try {
        const res = await fetch(`${API_BASE}/shorten`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (res.status === 429) {
          rateBanner.className = 'rate-banner visible';
          showResult('error', 'Rate limit exceeded. Please slow down.');
          return;
        }

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          showResult('error', err.message || `Error ${res.status}. Try again.`);
          return;
        }

        const data = await res.json();
        const shortUrl = data.shortUrl || `${window.location.origin}/${data.shortCode}`;

        showResult('success', shortUrl);
        addToHistory(url, shortUrl);
        urlInput.value = '';
        aliasInput.value = '';

      } catch (e) {
        showResult('error', 'Could not reach server. Is it running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Shorten';
      }
    }

    function showResult(type, message) {
      const box = document.getElementById('result-box');
      const urlSpan = document.getElementById('result-url');
      box.className = 'result ' + type;
      if (type === 'success') {
        urlSpan.textContent = message;
        document.getElementById('copy-btn').textContent = 'Copy';
        document.getElementById('copy-btn').className = 'copy-btn';
      } else {
        box.innerHTML = `<span>${message}</span>`;
      }
    }

    function copyResult() {
      const url = document.getElementById('result-url').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.className = 'copy-btn copied';
        setTimeout(() => { btn.textContent = 'Copy'; btn.className = 'copy-btn'; }, 1800);
      });
    }

    function addToHistory(original, short) {
      history.unshift({ original, short, ts: Date.now() });
      if (history.length > 10) history = history.slice(0, 10);
      localStorage.setItem('snip_history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const section = document.getElementById('history-section');
      const list = document.getElementById('history-list');
      if (history.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = history.map((item, i) => `
        <div class="history-item">
          <span class="history-original" title="${item.original}">${item.original}</span>
          <span class="history-short">${item.short}</span>
          <button class="history-copy" onclick="copyText('${item.short}', this)">copy</button>
        </div>
      `).join('');
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓';
        setTimeout(() => btn.textContent = 'copy', 1500);
      });
    }

    function clearHistory() {
      history = [];
      localStorage.removeItem('snip_history');
      renderHistory();
    }

    // Enter key support
    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });
    document.getElementById('alias-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });
</script>
</body>
</html>
