# Use the DATABASE_URL provided by Railway
# Note: We prefix with jdbc: because Railway provides a postgres:// string
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Force Postgres Dialect since Hibernate is struggling to auto-detect it
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis (Matching your latest Railway variables)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}